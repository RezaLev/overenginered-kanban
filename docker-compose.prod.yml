version: '3.8'

services:
  # --- Database ---
  postgres:
    image: postgres:16-alpine
    container_name: gotodo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gotodo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./go/structure.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Search Engine ---
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: gotodo-opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=ComplexPassword123!
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Go Backend API ---
  backend:
    build:
      context: ./go
      dockerfile: Dockerfile
    container_name: gotodo-backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-gotodo}
      OPENSEARCH_URL: http://opensearch:9200
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-*}
      PORT: "8080"
      APP_PASSKEY: ${APP_PASSKEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  # --- React Frontend (also serves as reverse proxy) ---
  frontend:
    build:
      context: ./react
      dockerfile: Dockerfile
      args:
        VITE_REQUIRE_PASSKEY: ${APP_PASSKEY:+true}
    container_name: gotodo-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  opensearch_data:
